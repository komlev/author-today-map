# Framework's own dev/preview server resolves extensionless URLs (e.g.
# /nakrutka -> nakrutka.html) — plain nginx doesn't do that by default, so
# built-in internal links (href="./genres") would 404 without this rule.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
