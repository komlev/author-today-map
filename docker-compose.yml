services:
  scraper:
    build: .
    volumes:
      - scraper-data:/data
    environment:
      - COOKIES=${COOKIES}
      - MIN_DELAY=${MIN_DELAY:-1.5}
      - MAX_DELAY=${MAX_DELAY:-4.0}
      - DEBUG=${DEBUG:-}
      - DEEP_SCRAPE=${DEEP_SCRAPE:-}
    restart: "no"

  fix-series:
    build: .
    volumes:
      - scraper-data:/data
    environment:
      - COOKIES=${COOKIES}
      - MIN_DELAY=${MIN_DELAY:-1.5}
      - MAX_DELAY=${MAX_DELAY:-4.0}
      - DEBUG=${DEBUG:-}
    entrypoint: ["python", "scripts/fix_series.py"]
    restart: "no"

  fix-authors:
    build: .
    volumes:
      - scraper-data:/data
    environment:
      - COOKIES=${COOKIES}
      - MIN_DELAY=${MIN_DELAY:-1.5}
      - MAX_DELAY=${MAX_DELAY:-4.0}
      - DEBUG=${DEBUG:-}
    entrypoint: ["python", "scripts/fix_authors.py"]
    restart: "no"

  # Regenerates authors_from_books.jsonl from books.jsonl — the viz build's
  # author-level data loaders read this, so it needs to exist in the volume
  # before viz-build can succeed. Rerun after scraping picks up enough new
  # books to be worth reflecting (no COOKIES/network needed, pure local
  # aggregation, so it's fast).
  extract-authors:
    build: .
    volumes:
      - scraper-data:/data
    entrypoint: ["python", "scripts/extract_authors.py"]
    restart: "no"

  # One-off build job, same pattern as fix-series/fix-authors above — rerun
  # manually (via Dokploy's "run command" on this service) whenever you want
  # the published dashboard to pick up newly scraped data. Reads the same
  # scraper-data volume read-only and writes the static site into viz-dist,
  # which the viz service below serves.
  viz-build:
    build:
      context: ./viz
    volumes:
      - scraper-data:/data:ro
      - viz-dist:/publish
    restart: "no"

  # Serves whatever viz-build last produced. Stays empty/404 until viz-build
  # has been run at least once. No host port published — Dokploy's Traefik
  # routes a domain straight to this container's port 80 over the internal
  # Docker network, so there's nothing here to collide with your other apps.
  # Set the domain for this service in Dokploy's UI, pointing at port 80.
  viz:
    image: nginx:alpine
    volumes:
      - viz-dist:/usr/share/nginx/html:ro
      - ./viz/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  scraper-data:
  viz-dist:
